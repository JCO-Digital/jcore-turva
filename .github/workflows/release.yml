name: Release version

on:
  push:
    branches:
      - main
      - "push-action/**"

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Build blocks
        run: make ci

      - name: Run foonver
        id: foonver
        uses: foonly/foonver@v0.13.0
        with:
          command: "auto"
          changelog: "true"
          push: "true"
          commit_suffix: "[skip ci]"
          version_sync: "jcore-turva.php"

      - name: Build release
        if: steps.foonver.outputs.is_bumped == 'true'
        run: make release

      - name: Create GitHub Release
        if: steps.foonver.outputs.is_bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.foonver.outputs.version }}
          name: Release ${{ steps.foonver.outputs.version }}
          body: ${{ steps.foonver.outputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            release/jcore-turva.zip

      - name: Publish to Update API
        if: steps.foonver.outputs.is_bumped == 'true'
        env:
          UPDATE_API_KEY: ${{ secrets.UPDATE_API_KEY }}
        run: |
          curl -i -X POST https://update.jcore.fi/v1/versions \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $UPDATE_API_KEY" \
            -d '{
              "slug": "jcore-turva",
              "version": "${{ steps.foonver.outputs.version }}",
              "download_url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.foonver.outputs.version }}/jcore-turva.zip",
              "changelog": ${{ toJson(steps.foonver.outputs.release_notes) }},
              "requires_wp": "6.7",
              "tested_wp": "6.7",
              "requires_php": "8.2"
            }'
