name: Release version

on:
  push:
    branches:
      - main
      - "push-action/**"

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      is_bumped: ${{ steps.foonver.outputs.is_bumped }}
      version: ${{ steps.foonver.outputs.version }}
      release_notes: ${{ steps.foonver.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Build blocks
        run: make ci

      - name: Run foonver
        id: foonver
        uses: foonly/foonver@v0.13.0
        with:
          command: "auto"
          changelog: "true"
          push: "true"
          commit_suffix: "[skip ci]"
          version_sync: "jcore-turva.php"

      - name: Build release
        if: steps.foonver.outputs.is_bumped == 'true'
        run: make release

  # Call the reusable workflow from jcore-update
  publish:
    needs: release
    if: needs.release.outputs.is_bumped == 'true'
    uses: JCO-Digital/jcore-update/.github/workflows/reusable-plugin-publish.yml@main
    with:
      slug: "jcore-turva"
      version: ${{ needs.release.outputs.version }}
      release_notes: ${{ needs.release.outputs.release_notes }}
      plugin_file: "jcore-turva.php"
      artifact_path: "release/jcore-turva.zip"
    secrets:
      UPDATE_API_KEY: ${{ secrets.UPDATE_API_KEY }}
